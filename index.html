<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="top-bar">
            <div class="top-bar-row">
                <div class="brand-search">
                    <h1 class="brand-title" aria-label="Icons">
                        <span class="brand-logo" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                                <rect x="3" y="3" width="8" height="8" rx="2"></rect>
                                <rect x="13" y="3" width="8" height="8" rx="2"></rect>
                                <rect x="3" y="13" width="8" height="8" rx="2"></rect>
                                <rect x="13" y="13" width="8" height="8" rx="2"></rect>
                            </svg>
                        </span>
                        <span class="brand-text">Icons</span>
                    </h1>
                    <div class="search-wrap">
                        <input type="text" id="searchInput" placeholder="Search icons by name, description, or metaphors..." />
                        <span id="iconCount" class="search-count-pill" aria-live="polite" aria-label="Visible icon count">0</span>
                    </div>
                </div>
                <div class="top-controls">
                    <div class="segmented-control icon-set-tabs" role="tablist" aria-label="Icon set selection">
                        <button type="button" class="segment-btn set-tab active" id="setTabFluent" data-set="fluent" role="tab" aria-selected="true">Fluent</button>
                        <button type="button" class="segment-btn set-tab" id="setTabFabric" data-set="fabric" role="tab" aria-selected="false">Fabric</button>
                    </div>
                    <div class="segmented-control style-filter" role="tablist" aria-label="Style filter">
                        <button type="button" class="segment-btn style-mode-button icon-mode-button" id="filterModeRegular" data-style-mode="regular" aria-selected="false" aria-label="Regular" title="Regular">
                            <span class="style-mode-icon regular-icon" aria-hidden="true"></span>
                        </button>
                        <button type="button" class="segment-btn style-mode-button icon-mode-button active" id="filterModeAll" data-style-mode="all" aria-selected="true" aria-label="All" title="All">
                            <span class="style-mode-icon mixed-icon" aria-hidden="true"></span>
                        </button>
                        <button type="button" class="segment-btn style-mode-button icon-mode-button" id="filterModeFilled" data-style-mode="filled" aria-selected="false" aria-label="Solid" title="Solid">
                            <span class="style-mode-icon filled-icon" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="icon-grid" id="iconGrid">
            <!-- Icons will be dynamically loaded here -->
        </div>
    </div>

    <div id="iconModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <p id="modalDescription"></p>
                <br/>
                <div id="metaphorsList"></div>
            </div>
            <div class="modal-body">
                <div class="icon-variants">
                    <div class="variant" id="regularVariant" style="display: none;">
                        <h3>Regular</h3>
                        <div class="icon-view icon-large" id="regularIcon"></div>
                        <div class="size-controls" id="regularControls">
                            <label for="regularSize">Size</label>
                            <select id="regularSize" aria-label="Regular icon size"></select>
                            <a id="regularCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="regularDownloadOptions">
                            <label class="download-toggle">
                                <input type="checkbox" id="regularCurrentColor">
                                Use <code>currentColor</code> for fills on download
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'regular')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('regular')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                    <div class="variant" id="filledVariant" style="display: none;">
                        <h3>Filled</h3>
                        <div class="icon-view icon-large" id="filledIcon"></div>
                        <div class="size-controls" id="filledControls">
                            <label for="filledSize">Size</label>
                            <select id="filledSize" aria-label="Filled icon size"></select>
                            <a id="filledCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="filledDownloadOptions">
                            <label class="download-toggle">
                                <input type="checkbox" id="filledCurrentColor">
                                Use <code>currentColor</code> for fills on download
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'filled')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('filled')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                    <div class="variant" id="colorVariant" style="display: none;">
                        <h3>Color</h3>
                        <div class="icon-view icon-large" id="colorIcon"></div>
                        <div class="size-controls" id="colorControls">
                            <label for="colorSize">Size</label>
                            <select id="colorSize" aria-label="Color icon size"></select>
                            <a id="colorCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="colorDownloadOptions">
                            <label class="download-toggle disabled">
                                <input type="checkbox" id="colorCurrentColor" disabled>
                                <code>currentColor</code> transform not available for color icons
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'color')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('color')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
