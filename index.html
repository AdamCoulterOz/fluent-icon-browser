<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="top-bar">
            <div class="top-bar-row">
                <div class="brand-search">
                    <h1 class="brand-title" aria-label="Icons">
                        <span class="brand-logo" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                                <rect x="3" y="3" width="8" height="8" rx="2"></rect>
                                <rect x="13" y="3" width="8" height="8" rx="2"></rect>
                                <rect x="3" y="13" width="8" height="8" rx="2"></rect>
                                <rect x="13" y="13" width="8" height="8" rx="2"></rect>
                            </svg>
                        </span>
                        <span class="brand-text">Icons</span>
                    </h1>
                    <div class="search-wrap">
                        <span class="search-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                                <circle cx="11" cy="11" r="6"></circle>
                                <line x1="15.5" y1="15.5" x2="20" y2="20"></line>
                            </svg>
                        </span>
                        <input type="text" id="searchInput" placeholder="Search icons by name, description, or metaphors..." />
                        <span id="iconCount" class="search-count-pill" aria-live="polite" aria-label="Visible icon count">0</span>
                    </div>
                </div>
                <div class="top-controls">
                    <div class="segmented-control icon-set-tabs" role="tablist" aria-label="Icon set selection">
                        <button type="button" class="segment-btn set-tab active" id="setTabFluent" data-set="fluent" role="tab" aria-selected="true">Fluent</button>
                        <button type="button" class="segment-btn set-tab" id="setTabFabric" data-set="fabric" role="tab" aria-selected="false">MDL2</button>
                    </div>
                    <div class="segmented-control style-filter" role="tablist" aria-label="Style filter">
                        <button type="button" class="segment-btn style-mode-button icon-mode-button" id="filterModeRegular" data-style-mode="regular" aria-selected="false" aria-label="Regular" title="Regular">
                            <span class="style-mode-icon regular-icon" aria-hidden="true"></span>
                        </button>
                        <button type="button" class="segment-btn style-mode-button icon-mode-button" id="filterModeFilled" data-style-mode="filled" aria-selected="false" aria-label="Solid" title="Solid">
                            <span class="style-mode-icon filled-icon" aria-hidden="true"></span>
                        </button>
                        <button type="button" class="segment-btn style-mode-button icon-mode-button" id="filterModeColor" data-style-mode="color" aria-selected="false" aria-label="Color" title="Color">
                            <span class="style-mode-icon color-icon" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="icon-grid" id="iconGrid">
            <!-- Icons will be dynamically loaded here -->
        </div>
    </div>

    <div id="iconModal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <button type="button" class="close" aria-label="Close details panel">&times;</button>
            <div class="panel-layout">
                <div class="modal-header panel-meta">
                    <h2 id="modalTitle"></h2>
                    <p id="modalDescription"></p>
                    <div id="metaphorsList"></div>
                </div>
                <div class="modal-body panel-preview">
                    <div class="panel-preview-header">
                        <div class="panel-toolbar">
                            <div class="segmented-control panel-variant-tabs" role="tablist" aria-label="Icon version selection">
                                <button type="button" class="segment-btn panel-variant-tab icon-mode-button" id="panelVariantRegular" data-variant="regular" aria-selected="false" aria-label="Regular" title="Regular">
                                    <span class="style-mode-icon regular-icon" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="segment-btn panel-variant-tab icon-mode-button" id="panelVariantFilled" data-variant="filled" aria-selected="false" aria-label="Solid" title="Solid">
                                    <span class="style-mode-icon filled-icon" aria-hidden="true"></span>
                                </button>
                                <button type="button" class="segment-btn panel-variant-tab icon-mode-button" id="panelVariantColor" data-variant="color" aria-selected="false" aria-label="Color" title="Color">
                                    <span class="style-mode-icon color-icon" aria-hidden="true"></span>
                                </button>
                            </div>
                            <span class="panel-size-wrap">
                                <select id="panelSizeSelect" class="panel-size-select" aria-label="Icon size"></select>
                            </span>
                            <button type="button" class="panel-icon-toggle" id="panelCurrentColorToggle" aria-pressed="false" aria-label="Use currentColor on download" title="Use currentColor on download">
                                <span class="toolbar-icon currentcolor-icon" aria-hidden="true"></span>
                            </button>
                            <div class="panel-actions-group">
                                <button type="button" class="panel-action-btn" id="panelCopyBtn" aria-label="Copy SVG" title="Copy SVG">
                                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                                        <rect x="9" y="9" width="10" height="11" rx="2"></rect>
                                        <path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path>
                                    </svg>
                                </button>
                                <button type="button" class="panel-action-btn" id="panelDownloadBtn" aria-label="Download SVG" title="Download SVG">
                                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                                        <path d="M12 4v10"></path>
                                        <path d="m8 10 4 4 4-4"></path>
                                        <path d="M5 18h14"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="panel-variants">
                        <div class="variant" id="regularVariant" style="display: none;">
                            <div class="icon-view icon-large" id="regularIcon"></div>
                        </div>
                        <div class="variant" id="filledVariant" style="display: none;">
                            <div class="icon-view icon-large" id="filledIcon"></div>
                        </div>
                        <div class="variant" id="colorVariant" style="display: none;">
                            <div class="icon-view icon-large" id="colorIcon"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
