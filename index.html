<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluent + Fabric Icon Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Fluent + Fabric Icon Browser</h1>
            <div class="icon-set-tabs" role="tablist" aria-label="Icon set selection">
                <button type="button" class="set-tab active" id="setTabFluent" data-set="fluent" role="tab" aria-selected="true">Fluent System</button>
                <button type="button" class="set-tab" id="setTabFabric" data-set="fabric" role="tab" aria-selected="false">Fabric MDL2</button>
            </div>
            <p class="set-subtitle" id="setSubtitle"></p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search icons by name, description, or metaphors..." />
                <div class="filters">
                    <label>
                        <input type="checkbox" id="filterRegular" checked> Regular
                    </label>
                    <label>
                        <input type="checkbox" id="filterFilled" checked> Filled
                    </label>
                    <label>
                        <input type="checkbox" id="filterColor" checked> Color
                    </label>
                </div>
            </div>
        </header>

        <div class="stats">
            <span id="iconCount">Loading icons...</span>
        </div>

        <div class="icon-grid" id="iconGrid">
            <!-- Icons will be dynamically loaded here -->
        </div>
    </div>

    <div id="iconModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <p id="modalDescription"></p>
                <br/>
                <div id="metaphorsList"></div>
            </div>
            <div class="modal-body">
                <div class="icon-variants">
                    <div class="variant" id="regularVariant" style="display: none;">
                        <h3>Regular</h3>
                        <div class="icon-view icon-large" id="regularIcon"></div>
                        <div class="size-controls" id="regularControls">
                            <label for="regularSize">Size</label>
                            <select id="regularSize" aria-label="Regular icon size"></select>
                            <a id="regularCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="regularDownloadOptions">
                            <label class="download-toggle">
                                <input type="checkbox" id="regularCurrentColor">
                                Use <code>currentColor</code> for fills on download
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'regular')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('regular')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                    <div class="variant" id="filledVariant" style="display: none;">
                        <h3>Filled</h3>
                        <div class="icon-view icon-large" id="filledIcon"></div>
                        <div class="size-controls" id="filledControls">
                            <label for="filledSize">Size</label>
                            <select id="filledSize" aria-label="Filled icon size"></select>
                            <a id="filledCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="filledDownloadOptions">
                            <label class="download-toggle">
                                <input type="checkbox" id="filledCurrentColor">
                                Use <code>currentColor</code> for fills on download
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'filled')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('filled')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                    <div class="variant" id="colorVariant" style="display: none;">
                        <h3>Color</h3>
                        <div class="icon-view icon-large" id="colorIcon"></div>
                        <div class="size-controls" id="colorControls">
                            <label for="colorSize">Size</label>
                            <select id="colorSize" aria-label="Color icon size"></select>
                            <a id="colorCdnLink" class="cdn-link" href="#" target="_blank" rel="noopener noreferrer">Open Source</a>
                        </div>
                        <div class="download-options" id="colorDownloadOptions">
                            <label class="download-toggle disabled">
                                <input type="checkbox" id="colorCurrentColor" disabled>
                                <code>currentColor</code> transform not available for color icons
                            </label>
                        </div>
                        <div class="icon-actions">
                            <button class="icon-btn icon-clipboard"
                                    onclick="copyToClipboard(event, 'color')"
                                    title="Copy SVG"></button>

                            <button class="icon-btn icon-download"
                                    onclick="downloadIcon('color')"
                                    title="Download SVG"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
